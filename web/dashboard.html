<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://unpkg.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="icon" type="image/png" href="favicon.png">
  <title>Dashboard - Cold Outreach CRM</title>
  <link rel="stylesheet" href="assets/css/global.css">
  <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-content">
      <header class="topbar" id="topbar"></header>
      <main class="page-content" id="page-content">
        <div id="dashboard-reminders"></div>
        <div id="kpi-grid"></div>

        <!-- Row 1: Omzet stacked bar + Donut verdeling -->
        <div class="grid-2 mb-24" id="charts-row-1">
          <div class="dashboard-card">
            <div class="dashboard-card-header">
              <span class="dashboard-label">Maandelijkse omzet breakdown</span>
              <span id="revenue-chart-year" style="font-size:11px;color:var(--text-muted);"></span>
            </div>
            <div class="card-body" style="padding:0;"><canvas id="revenue-stacked-chart" height="280"></canvas></div>
          </div>
          <div class="dashboard-card">
            <div class="dashboard-card-header">
              <span class="dashboard-label">Omzet verdeling</span>
            </div>
            <div class="card-body" style="padding:0;position:relative;">
              <div style="max-width:260px;margin:0 auto;"><canvas id="revenue-donut-chart" height="260"></canvas></div>
              <div id="donut-center-label" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;">
                <div style="font-size:11px;color:var(--text-muted);">Totaal</div>
                <div id="donut-total" style="font-size:20px;font-weight:700;color:var(--text-primary);"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- Row 2: Funnel + Kwartaal vergelijking -->
        <div class="grid-2 mb-24" id="charts-row-2">
          <div class="dashboard-card">
            <div class="dashboard-card-header">
              <span class="dashboard-label">Lead Pipeline Funnel</span>
            </div>
            <div class="card-body" style="padding:0;"><canvas id="funnel-chart" height="260"></canvas></div>
          </div>
          <div class="dashboard-card">
            <div class="dashboard-card-header">
              <span class="dashboard-label">Kwartaal vergelijking</span>
            </div>
            <div class="card-body" style="padding:0;"><canvas id="quarter-chart" height="260"></canvas></div>
          </div>
        </div>

        <!-- Row 3: Acquisitie kanalen + Locatie stats -->
        <div class="grid-2 mb-24" id="charts-row-3">
          <div class="dashboard-card">
            <div class="dashboard-card-header">
              <span class="dashboard-label">Acquisitie kanalen</span>
            </div>
            <div class="card-body" style="padding:0;">
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:center;">
                <div style="max-width:200px;margin:0 auto;"><canvas id="acquisition-polar-chart" height="200"></canvas></div>
                <div id="acquisition-stats"></div>
              </div>
            </div>
          </div>
          <div class="dashboard-card">
            <div class="dashboard-card-header">
              <span class="dashboard-label">Top locaties</span>
            </div>
            <div class="card-body" style="padding:0;"><canvas id="location-chart" height="260"></canvas></div>
          </div>
        </div>

        <!-- Row 4: Financieel overzicht + Recente leads -->
        <div class="grid-2 mb-24">
          <div class="dashboard-card">
            <div class="dashboard-card-header">
              <span class="dashboard-label">Financieel overzicht</span>
            </div>
            <div class="card-body" style="padding:0;" id="financial-summary"></div>
          </div>
          <div class="dashboard-card">
            <div class="dashboard-card-header">
              <span class="dashboard-label">Recente leads</span>
            </div>
            <div class="card-body" style="padding:0;" id="recent-leads"></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/sidebar.js"></script>
  <script src="assets/js/tooltips.js"></script>
  <script>
    const CHART_TOOLTIP = {
      backgroundColor: '#111111',
      borderColor: 'rgba(255,255,255,0.1)',
      borderWidth: 1,
      titleColor: '#f0f0f0',
      bodyColor: '#a0a0a0',
      cornerRadius: 8,
      padding: 12
    };

    async function init() {
      if (!await requireLogin()) return;
      initSidebar();
      initTopbar('Dashboard');
      API.post('/leads/auto-expire', { days: 7 }).catch(() => {});
      loadDashboardReminders();
      loadDashboard();
    }

    async function loadDashboardReminders() {
      try {
        const reminders = await API.get('/calendar/reminders');
        const container = document.getElementById('dashboard-reminders');
        if (!reminders || reminders.length === 0) { container.innerHTML = ''; return; }

        container.innerHTML = `
          <div style="background:var(--bg-card);border:1px solid var(--accent-orange-dim);border-left:4px solid var(--accent-orange);border-radius:var(--radius);padding:16px 20px;margin-bottom:20px;">
            <div style="font-size:14px;font-weight:700;color:var(--accent-orange);margin-bottom:12px;display:flex;align-items:center;gap:8px;">
              <i data-lucide="bell-ring" style="width:18px;height:18px;"></i>
              ${reminders.length} afspraak${reminders.length > 1 ? 'en' : ''} binnenkort - stuur een herinnering!
            </div>
            ${reminders.map(r => {
              const time = new Date(r.startTime).toLocaleString('nl-BE', { weekday: 'short', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
              const phone = r.lead?.phone || '';
              const company = r.lead?.companyName || r.title;
              return `
                <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg-input);border-radius:var(--radius-sm);margin-bottom:8px;gap:12px;">
                  <div style="flex:1;">
                    <div style="font-weight:600;font-size:13px;">${company}</div>
                    <div style="font-size:12px;color:var(--text-muted);">${time}</div>
                    ${phone ? `<div style="font-size:12px;color:var(--accent-brand);font-weight:600;">${phone}</div>` : '<div style="font-size:12px;color:var(--accent-red);">Geen telefoonnummer</div>'}
                  </div>
                  <div style="display:flex;gap:6px;flex-shrink:0;">
                    ${phone ? `<a href="tel:${phone}" class="btn btn-primary btn-sm"><i data-lucide="phone" style="width:12px;height:12px;"></i> Bellen</a>` : ''}
                    <button class="btn btn-ghost btn-sm" onclick="markDashboardReminder('${r.id}')">Gedaan</button>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        `;
        refreshIcons();
      } catch (err) {
        console.error('Reminders error:', err);
      }
    }

    async function markDashboardReminder(id) {
      try {
        await API.post(`/calendar/reminders/${id}/sent`);
        showToast('Herinnering gemarkeerd als verstuurd');
        loadDashboardReminders();
      } catch (err) { showToast(err.message, 'error'); }
    }

    async function loadDashboard() {
      try {
        const [dashboard, funnel, revenue, recentLeads, locations, hosting] = await Promise.all([
          API.get('/stats/dashboard'),
          API.get('/stats/funnel'),
          API.get('/stats/revenue'),
          API.get('/stats/recent-leads'),
          API.get('/stats/locations'),
          API.get('/stats/hosting')
        ]);

        renderKPIs(dashboard, revenue);
        renderRevenueStackedChart(revenue);
        renderRevenueDonut(revenue);
        renderFunnelChart(funnel);
        renderQuarterChart(revenue);
        renderAcquisitionPolar(revenue);
        renderLocationChart(locations.all || locations);
        renderFinancialSummary(dashboard, revenue);
        renderRecentLeads(recentLeads);
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    // ========== KPI CARDS ==========
    function renderKPIs(data, revenue) {
      const c = data.current;
      const conv = data.conversions;
      const grid = document.getElementById('kpi-grid');
      
      const mrr = revenue?.breakdown ? (revenue.breakdown.actualMRR + revenue.breakdown.upsellMRR) : 0;
      const currentYear = revenue?.currentYear || new Date().getFullYear();
      const hostingCurrentYear = revenue?.breakdown?.hostingCurrentYear || 0;
      const upsellCurrentYear = revenue?.breakdown?.upsellCurrentYear || 0;
      const eenmaligNetto = revenue?.breakdown ? (revenue.breakdown.eenmalig + revenue.breakdown.upsellOneTime - revenue.breakdown.discount) : 0;
      const totalCurrentYear = eenmaligNetto + hostingCurrentYear + upsellCurrentYear;
      const profitThisYear = revenue?.totalProfitThisYear || 0;
      const profitMargin = revenue?.profitMarginThisYear || 0;

      grid.innerHTML = `
        <div class="section-header" style="border-bottom:1px solid var(--border-color);margin-bottom:20px;padding-bottom:10px;">
          <span class="section-header-title" style="color:var(--text-primary);font-size:16px;">Lead Pipeline</span>
        </div>
        <div class="dashboard-kpi-grid">
          ${kpiCard('Total Leads', 'total-leads', 'users', '--accent-blue', data.totalLeads, `<span style="color:var(--accent-blue);">+${c.NIEUW}</span> nieuw`)}
          ${kpiCard('Verstuurd', 'verstuurd', 'send', '--accent-blue', c.VERSTUURD + c.GEEN_REACTIE, `${conv.sendRate}% van totaal`)}
          ${kpiCard('Reacties', 'reacties', 'message-square', '--accent-orange', c.GEREAGEERD + c.NIET_GEINTERESSEERD, `<span style="color:var(--accent-orange);">${conv.responseRate}%</span> reactieratio`)}
          ${kpiCard('Interesse', 'interesse', 'thumbs-up', '--accent-purple', c.AFSPRAAK, `<span style="color:var(--accent-purple);">${conv.interestRate}%</span> conversie`)}
        </div>

        <div class="section-header" style="border-bottom:1px solid var(--border-color);margin-bottom:20px;padding-bottom:10px;margin-top:40px;">
          <span class="section-header-title" style="color:var(--text-primary);font-size:16px;">Klanten & Omzet ${currentYear}</span>
        </div>
        <div class="dashboard-kpi-grid" style="grid-template-columns:repeat(4,1fr);">
          ${kpiCard('Klanten', 'totaal-klanten', 'building-2', '--accent-green', data.totalClients || c.KLANT, `<span style="color:var(--accent-green);">${data.totalClients || c.KLANT}</span> actief`)}
          ${kpiCard('MRR', 'mrr', 'repeat', '--accent-green', formatCurrency(mrr), `Hosting + upsells`)}
          ${kpiCard(`Omzet ${currentYear}`, 'omzet-jaar', 'trending-up', '--accent-green', formatCurrency(totalCurrentYear), `<span style="font-size:11px;">Een: ${formatCurrency(eenmaligNetto)} | Host: ${formatCurrency(hostingCurrentYear)}</span>`)}
          ${kpiCard(`Winst ${currentYear}`, 'winst-jaar', 'piggy-bank', profitThisYear >= 0 ? '--accent-green' : '--accent-red', formatCurrency(profitThisYear), `Marge: ${profitMargin}%`)}
        </div>
      `;
      refreshIcons();
    }

    function kpiCard(label, tooltipKey, icon, colorVar, value, subtext) {
      return `
        <div class="dashboard-card">
          <div class="dashboard-card-header">
            ${wrapWithTooltip(`<span class="dashboard-label">${label}</span>`, tooltipKey)}
            <i data-lucide="${icon}" style="color:var(${colorVar});width:18px;height:18px;"></i>
          </div>
          <div class="dashboard-value">${value}</div>
          <div class="dashboard-subtext">${subtext}</div>
        </div>
      `;
    }

    // ========== STACKED BAR: Maandelijkse omzet ==========
    function renderRevenueStackedChart(revenue) {
      const ctx = document.getElementById('revenue-stacked-chart').getContext('2d');
      const monthlyData = revenue.monthlyBreakdown || [];
      const labels = monthlyData.map(m => {
        const [y, mo] = m.month.split('-');
        return ['Jan','Feb','Mrt','Apr','Mei','Jun','Jul','Aug','Sep','Okt','Nov','Dec'][parseInt(mo) - 1];
      });

      document.getElementById('revenue-chart-year').textContent = revenue.currentYear;

      new Chart(ctx, {
        type: 'bar',
        data: {
          labels,
          datasets: [
            {
              label: 'Eenmalig',
              data: monthlyData.map(m => m.eenmalig - (m.korting || 0)),
              backgroundColor: 'rgba(96, 165, 250, 0.8)',
              borderColor: '#60A5FA',
              borderWidth: 1,
              borderRadius: { topLeft: 0, topRight: 0 },
              stack: 'revenue'
            },
            {
              label: 'Hosting',
              data: monthlyData.map(m => m.hosting),
              backgroundColor: 'rgba(52, 211, 153, 0.8)',
              borderColor: '#34d399',
              borderWidth: 1,
              borderRadius: { topLeft: 0, topRight: 0 },
              stack: 'revenue'
            },
            {
              label: 'Upsells (eenmalig)',
              data: monthlyData.map(m => m.upsellEenmalig || 0),
              backgroundColor: 'rgba(139, 92, 246, 0.8)',
              borderColor: '#8B5CF6',
              borderWidth: 1,
              borderRadius: { topLeft: 0, topRight: 0 },
              stack: 'revenue'
            },
            {
              label: 'Upsells (mnd)',
              data: monthlyData.map(m => m.upsellMaandelijks || 0),
              backgroundColor: 'rgba(167, 139, 250, 0.8)',
              borderColor: '#A78BFA',
              borderWidth: 1,
              borderRadius: { topLeft: 4, topRight: 4 },
              stack: 'revenue'
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              display: true,
              position: 'top',
              labels: { color: '#94a3b8', font: { size: 11 }, boxWidth: 12, padding: 16, usePointStyle: true, pointStyle: 'rectRounded' }
            },
            tooltip: {
              ...CHART_TOOLTIP,
              mode: 'index',
              callbacks: {
                label: (ctx) => `${ctx.dataset.label}: ${formatCurrency(ctx.parsed.y)}`,
                footer: (items) => {
                  const total = items.reduce((s, i) => s + i.parsed.y, 0);
                  return `Totaal: ${formatCurrency(total)}`;
                }
              }
            }
          },
          scales: {
            x: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 11 } } },
            y: {
              stacked: true,
              grid: { color: 'rgba(255,255,255,0.05)', drawBorder: false },
              ticks: { color: '#94a3b8', font: { size: 11 }, callback: v => formatCurrency(v) }
            }
          }
        }
      });
    }

    // ========== DONUT: Omzet verdeling ==========
    function renderRevenueDonut(revenue) {
      const ctx = document.getElementById('revenue-donut-chart').getContext('2d');
      const b = revenue.breakdown || {};
      const eenmalig = (b.eenmalig || 0) + (b.upsellOneTime || 0) - (b.discount || 0);
      const hosting = b.hostingCurrentYear || 0;
      const upsells = b.upsellCurrentYear || 0;
      const total = eenmalig + hosting + upsells;

      document.getElementById('donut-total').textContent = formatCurrency(total);

      new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: ['Eenmalig', 'Hosting', 'Upsells'],
          datasets: [{
            data: [eenmalig, hosting, upsells],
            backgroundColor: ['rgba(96, 165, 250, 0.85)', 'rgba(52, 211, 153, 0.85)', 'rgba(167, 139, 250, 0.85)'],
            borderColor: ['#60A5FA', '#34d399', '#A78BFA'],
            borderWidth: 2,
            hoverOffset: 8
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          cutout: '68%',
          plugins: {
            legend: {
              display: true,
              position: 'bottom',
              labels: { color: '#94a3b8', font: { size: 11 }, padding: 16, usePointStyle: true, pointStyle: 'circle' }
            },
            tooltip: {
              ...CHART_TOOLTIP,
              callbacks: {
                label: (ctx) => {
                  const val = ctx.parsed;
                  const pct = total > 0 ? ((val / total) * 100).toFixed(1) : 0;
                  return `${ctx.label}: ${formatCurrency(val)} (${pct}%)`;
                }
              }
            }
          }
        }
      });
    }

    // ========== FUNNEL: Horizontal bar ==========
    function renderFunnelChart(data) {
      const ctx = document.getElementById('funnel-chart').getContext('2d');
      const labels = data.funnel.map(f => STATUS_LABELS[f.status] || f.status);
      const values = data.funnel.map(f => f.count);
      const colors = [
        'rgba(107, 114, 128, 0.8)', 'rgba(96, 165, 250, 0.8)', 'rgba(251, 146, 60, 0.8)',
        'rgba(34, 211, 238, 0.8)', 'rgba(167, 139, 250, 0.8)', 'rgba(59, 130, 246, 0.8)', 'rgba(248, 113, 113, 0.8)'
      ];
      const borderColors = ['#6B7280', '#60A5FA', '#FB923C', '#22D3EE', '#A78BFA', '#3B82F6', '#F87171'];
      const totalLeads = values.reduce((a, b) => a + b, 0);

      new Chart(ctx, {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            data: values,
            backgroundColor: colors,
            borderColor: borderColors,
            borderWidth: 1,
            borderRadius: 8,
            borderSkipped: false,
            barThickness: 28
          }]
        },
        options: {
          indexAxis: 'y',
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              ...CHART_TOOLTIP,
              callbacks: {
                label: (ctx) => {
                  const v = ctx.parsed.x;
                  const pct = totalLeads > 0 ? ((v / totalLeads) * 100).toFixed(1) : 0;
                  return [`${v} leads (${pct}%)`];
                }
              }
            }
          },
          scales: {
            x: { grid: { color: 'rgba(255,255,255,0.05)', drawBorder: false }, ticks: { color: '#94a3b8', font: { size: 11 } } },
            y: { grid: { display: false }, ticks: { color: '#cbd5e1', font: { size: 12, weight: 500 } } }
          }
        }
      });
    }

    // ========== GROUPED BAR: Kwartaal vergelijking ==========
    function renderQuarterChart(revenue) {
      const ctx = document.getElementById('quarter-chart').getContext('2d');
      const q = revenue.quarters || {};
      const labels = ['Q1', 'Q2', 'Q3', 'Q4'];

      new Chart(ctx, {
        type: 'bar',
        data: {
          labels,
          datasets: [
            {
              label: 'Eenmalig',
              data: labels.map(qk => (q[qk]?.eenmalig || 0)),
              backgroundColor: 'rgba(96, 165, 250, 0.75)',
              borderColor: '#60A5FA',
              borderWidth: 1,
              borderRadius: 6
            },
            {
              label: 'Hosting',
              data: labels.map(qk => (q[qk]?.hosting || 0)),
              backgroundColor: 'rgba(52, 211, 153, 0.75)',
              borderColor: '#34d399',
              borderWidth: 1,
              borderRadius: 6
            },
            {
              label: 'Upsells',
              data: labels.map(qk => (q[qk]?.upsells || 0)),
              backgroundColor: 'rgba(167, 139, 250, 0.75)',
              borderColor: '#A78BFA',
              borderWidth: 1,
              borderRadius: 6
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              display: true,
              position: 'top',
              labels: { color: '#94a3b8', font: { size: 11 }, boxWidth: 12, padding: 16, usePointStyle: true, pointStyle: 'rectRounded' }
            },
            tooltip: {
              ...CHART_TOOLTIP,
              mode: 'index',
              callbacks: {
                label: (ctx) => `${ctx.dataset.label}: ${formatCurrency(ctx.parsed.y)}`,
                footer: (items) => {
                  const total = items.reduce((s, i) => s + i.parsed.y, 0);
                  return `Totaal: ${formatCurrency(total)}`;
                }
              }
            }
          },
          scales: {
            x: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 12, weight: 600 } } },
            y: {
              grid: { color: 'rgba(255,255,255,0.05)', drawBorder: false },
              ticks: { color: '#94a3b8', font: { size: 11 }, callback: v => formatCurrency(v) }
            }
          }
        }
      });
    }

    // ========== POLAR AREA: Acquisitie kanalen ==========
    function renderAcquisitionPolar(revenue) {
      const ctx = document.getElementById('acquisition-polar-chart').getContext('2d');
      const flyer = revenue.flyer || {};
      const warm = revenue.warm || {};

      new Chart(ctx, {
        type: 'polarArea',
        data: {
          labels: ['Flyer omzet', 'Warm omzet', 'Flyer kosten', 'Warm kosten'],
          datasets: [{
            data: [flyer.revenue || 0, warm.revenue || 0, flyer.cost || 0, warm.cost || 0],
            backgroundColor: [
              'rgba(96, 165, 250, 0.7)',
              'rgba(52, 211, 153, 0.7)',
              'rgba(251, 146, 60, 0.5)',
              'rgba(248, 113, 113, 0.5)'
            ],
            borderColor: ['#60A5FA', '#34d399', '#FB923C', '#F87171'],
            borderWidth: 2
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              ...CHART_TOOLTIP,
              callbacks: { label: (ctx) => `${ctx.label}: ${formatCurrency(ctx.parsed.r)}` }
            }
          },
          scales: {
            r: {
              grid: { color: 'rgba(255,255,255,0.05)' },
              ticks: { display: false },
              pointLabels: { display: false }
            }
          }
        }
      });

      // Stats sidebar
      const statsEl = document.getElementById('acquisition-stats');
      const flyerROI = flyer.roi || 0;
      const warmROI = warm.roi || 0;
      statsEl.innerHTML = `
        <div style="display:flex;flex-direction:column;gap:12px;">
          <div style="font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;">Flyer</div>
          <div style="display:flex;justify-content:space-between;">
            <span style="font-size:12px;color:var(--text-muted);">Deals</span>
            <span style="font-size:13px;font-weight:600;">${flyer.count || 0}</span>
          </div>
          <div style="display:flex;justify-content:space-between;">
            <span style="font-size:12px;color:var(--text-muted);">Omzet</span>
            <span style="font-size:13px;font-weight:600;color:#60A5FA;">${formatCurrency(flyer.revenue || 0)}</span>
          </div>
          <div style="display:flex;justify-content:space-between;">
            <span style="font-size:12px;color:var(--text-muted);">ROI</span>
            <span style="font-size:13px;font-weight:600;color:${flyerROI > 0 ? '#34d399' : '#F87171'};">${flyerROI}%</span>
          </div>
          <hr style="border-color:var(--border-color);margin:4px 0;">
          <div style="font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;">Warm / Direct</div>
          <div style="display:flex;justify-content:space-between;">
            <span style="font-size:12px;color:var(--text-muted);">Deals</span>
            <span style="font-size:13px;font-weight:600;">${warm.count || 0}</span>
          </div>
          <div style="display:flex;justify-content:space-between;">
            <span style="font-size:12px;color:var(--text-muted);">Omzet</span>
            <span style="font-size:13px;font-weight:600;color:#34d399;">${formatCurrency(warm.revenue || 0)}</span>
          </div>
          <div style="display:flex;justify-content:space-between;">
            <span style="font-size:12px;color:var(--text-muted);">ROI</span>
            <span style="font-size:13px;font-weight:600;color:${warmROI > 0 ? '#34d399' : '#F87171'};">${warmROI}%</span>
          </div>
        </div>
      `;
    }

    // ========== HORIZONTAL BAR: Top locaties ==========
    function renderLocationChart(locations) {
      const top = locations.slice(0, 8);
      const ctx = document.getElementById('location-chart').getContext('2d');

      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: top.map(l => l.city),
          datasets: [
            {
              label: 'Leads',
              data: top.map(l => l.total),
              backgroundColor: 'rgba(107, 114, 128, 0.6)',
              borderColor: '#6B7280',
              borderWidth: 1,
              borderRadius: 4
            },
            {
              label: 'Klanten',
              data: top.map(l => l.klanten),
              backgroundColor: 'rgba(52, 211, 153, 0.7)',
              borderColor: '#34d399',
              borderWidth: 1,
              borderRadius: 4
            }
          ]
        },
        options: {
          indexAxis: 'y',
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              display: true,
              position: 'top',
              labels: { color: '#94a3b8', font: { size: 11 }, boxWidth: 12, padding: 16, usePointStyle: true, pointStyle: 'rectRounded' }
            },
            tooltip: {
              ...CHART_TOOLTIP,
              callbacks: {
                afterBody: (items) => {
                  const idx = items[0].dataIndex;
                  const loc = top[idx];
                  return [
                    `Verstuurd: ${loc.verstuurd}`,
                    `Gereageerd: ${loc.gereageerd}`,
                    `Reactieratio: ${loc.responseRate}%`,
                    `Conversie: ${loc.conversionRate}%`,
                    loc.revenue > 0 ? `Omzet: ${formatCurrency(loc.revenue)}` : ''
                  ].filter(Boolean);
                }
              }
            }
          },
          scales: {
            x: { grid: { color: 'rgba(255,255,255,0.05)', drawBorder: false }, ticks: { color: '#94a3b8', font: { size: 11 } } },
            y: { grid: { display: false }, ticks: { color: '#cbd5e1', font: { size: 11, weight: 500 } } }
          }
        }
      });
    }

    // ========== FINANCIAL SUMMARY with progress bars ==========
    function renderFinancialSummary(dashboard, revenue) {
      const container = document.getElementById('financial-summary');
      const yr = revenue?.currentYear || new Date().getFullYear();
      const b = revenue?.breakdown || {};
      const hostCY = b.hostingCurrentYear || 0;
      const upsellCY = b.upsellCurrentYear || 0;
      const eenmalig = (b.eenmalig || 0) + (b.upsellOneTime || 0) - (b.discount || 0);
      const totalCY = eenmalig + hostCY + upsellCY;
      const profit = revenue?.totalProfitThisYear || 0;
      const costs = revenue?.totalCostsThisYear || 0;
      const maxBar = Math.max(eenmalig, hostCY, upsellCY, 1);

      function progressBar(value, color, maxVal) {
        const pct = maxVal > 0 ? Math.min((value / maxVal) * 100, 100) : 0;
        return `<div style="width:100%;height:6px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden;margin-top:4px;">
          <div style="width:${pct}%;height:100%;background:${color};border-radius:3px;transition:width 0.6s ease;"></div>
        </div>`;
      }

      container.innerHTML = `
        <div style="display:flex;flex-direction:column;gap:14px;">
          <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:rgba(52,211,153,0.08);border-radius:8px;border-left:3px solid #34d399;">
            <span style="color:var(--text-muted);font-size:13px;">Totaal omzet ${yr}</span>
            <span style="font-weight:800;font-size:20px;color:#34d399;">${formatCurrency(totalCY)}</span>
          </div>

          <div style="padding:0 4px;">
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <span style="color:var(--text-muted);font-size:12px;">Eenmalig netto</span>
              <span style="font-weight:600;font-size:13px;color:#60A5FA;">${formatCurrency(eenmalig)}</span>
            </div>
            ${progressBar(eenmalig, '#60A5FA', maxBar)}
          </div>
          <div style="padding:0 4px;">
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <span style="color:var(--text-muted);font-size:12px;">Hosting ${yr}</span>
              <span style="font-weight:600;font-size:13px;color:#34d399;">${formatCurrency(hostCY)}</span>
            </div>
            ${progressBar(hostCY, '#34d399', maxBar)}
          </div>
          ${upsellCY > 0 ? `<div style="padding:0 4px;">
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <span style="color:var(--text-muted);font-size:12px;">Upsells ${yr}</span>
              <span style="font-weight:600;font-size:13px;color:#A78BFA;">${formatCurrency(upsellCY)}</span>
            </div>
            ${progressBar(upsellCY, '#A78BFA', maxBar)}
          </div>` : ''}

          <hr style="border-color:var(--border-color);margin:4px 0;">

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
            <div style="padding:12px;background:rgba(52,211,153,0.08);border-radius:8px;text-align:center;">
              <div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;">Winst</div>
              <div style="font-size:16px;font-weight:700;color:${profit >= 0 ? '#34d399' : '#F87171'};margin-top:4px;">${formatCurrency(profit)}</div>
            </div>
            <div style="padding:12px;background:rgba(248,113,113,0.08);border-radius:8px;text-align:center;">
              <div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;">Kosten</div>
              <div style="font-size:16px;font-weight:700;color:#FB923C;margin-top:4px;">${formatCurrency(costs)}</div>
            </div>
          </div>

          <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:rgba(96,165,250,0.08);border-radius:8px;border-left:3px solid #60A5FA;">
            <span style="color:var(--text-muted);font-size:13px;">ROI</span>
            <span style="font-weight:800;font-size:18px;color:#60A5FA;">${revenue?.roi || 0}%</span>
          </div>

          <hr style="border-color:var(--border-color);margin:4px 0;">
          <div style="font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;">Per pakket</div>
          ${(revenue?.packageRevenue || []).length > 0 ? revenue.packageRevenue.map(p => `
            <div style="display:flex;justify-content:space-between;align-items:center;padding:0 4px;">
              <span style="font-size:12px;color:var(--text-muted);">${p.name}</span>
              <span style="font-weight:600;font-size:12px;color:var(--text-primary);">${formatCurrency(p.revenue)}</span>
            </div>
          `).join('') : '<span style="font-size:12px;color:var(--text-muted);padding:0 4px;">Nog geen deals</span>'}
        </div>
      `;
    }

    // ========== RECENT LEADS ==========
    function renderRecentLeads(leads) {
      const container = document.getElementById('recent-leads');
      if (leads.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-title">Geen leads</div><div class="empty-state-text">Importeer leads om te beginnen</div></div>';
        return;
      }

      container.innerHTML = `
        <table class="data-table">
          <thead><tr><th>Bedrijf</th><th>Gemeente</th><th>Status</th><th>Datum</th></tr></thead>
          <tbody>
            ${leads.map(l => `
              <tr>
                <td>${l.companyName}</td>
                <td>${l.city || '-'}</td>
                <td>${statusBadge(l.status)}</td>
                <td>${formatDate(l.createdAt)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    init();
  </script>
</body>
</html>
