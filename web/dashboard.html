<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://unpkg.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="icon" type="image/png" href="favicon.png">
  <title>Dashboard - Cold Outreach CRM</title>
  <link rel="stylesheet" href="assets/css/global.css">
  <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-content">
      <header class="topbar" id="topbar"></header>
      <main class="page-content" id="page-content">
        <!-- Herinneringen -->
        <div id="dashboard-reminders"></div>

        <!-- Top KPIs: 4 grote kaarten -->
        <div id="kpi-grid"></div>

        <!-- Row 1: Omzet trend (compact line/bar) + Mini funnel -->
        <div class="grid-2 mb-24">
          <div class="dashboard-card">
            <div class="dashboard-card-header">
              <span class="dashboard-label">Omzet trend</span>
              <span id="revenue-chart-year" style="font-size:11px;color:var(--text-muted);"></span>
            </div>
            <div class="card-body" style="padding:0;"><canvas id="revenue-trend-chart" height="220"></canvas></div>
          </div>
          <div class="dashboard-card">
            <div class="dashboard-card-header">
              <span class="dashboard-label">Pipeline snapshot</span>
            </div>
            <div class="card-body" style="padding:0;">
              <div id="pipeline-snapshot"></div>
            </div>
          </div>
        </div>

        <!-- Row 2: Recente activiteit + Quick stats -->
        <div class="grid-2 mb-24">
          <div class="dashboard-card">
            <div class="dashboard-card-header">
              <span class="dashboard-label">Recente leads</span>
              <a href="leads.html" style="font-size:11px;color:var(--accent-brand);text-decoration:none;">Bekijk alle &rarr;</a>
            </div>
            <div class="card-body" style="padding:0;" id="recent-leads"></div>
          </div>
          <div class="dashboard-card">
            <div class="dashboard-card-header">
              <span class="dashboard-label">Omzet verdeling</span>
            </div>
            <div class="card-body" style="padding:0;" id="revenue-split"></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/sidebar.js"></script>
  <script src="assets/js/tooltips.js"></script>
  <script>
    const TT = { backgroundColor: '#1E293B', borderColor: 'rgba(59,130,246,0.2)', borderWidth: 1, titleColor: '#E5E7EB', bodyColor: '#94A3B8', cornerRadius: 8, padding: 12 };

    async function init() {
      if (!await requireLogin()) return;
      initSidebar();
      initTopbar('Dashboard');
      API.post('/leads/auto-expire', { days: 7 }).catch(() => {});
      loadDashboardReminders();
      loadDashboard();
    }

    async function loadDashboardReminders() {
      try {
        const reminders = await API.get('/calendar/reminders');
        const container = document.getElementById('dashboard-reminders');
        if (!reminders || reminders.length === 0) { container.innerHTML = ''; return; }

        container.innerHTML = `
          <div style="background:var(--bg-card);border:1px solid var(--accent-orange-dim);border-left:4px solid var(--accent-orange);border-radius:var(--radius);padding:16px 20px;margin-bottom:20px;">
            <div style="font-size:14px;font-weight:700;color:var(--accent-orange);margin-bottom:12px;display:flex;align-items:center;gap:8px;">
              <i data-lucide="bell-ring" style="width:18px;height:18px;"></i>
              ${reminders.length} afspraak${reminders.length > 1 ? 'en' : ''} binnenkort - stuur een herinnering!
            </div>
            ${reminders.map(r => {
              const time = new Date(r.startTime).toLocaleString('nl-BE', { weekday: 'short', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
              const phone = r.lead?.phone || '';
              const company = r.lead?.companyName || r.title;
              return `
                <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg-input);border-radius:var(--radius-sm);margin-bottom:8px;gap:12px;">
                  <div style="flex:1;">
                    <div style="font-weight:600;font-size:13px;">${company}</div>
                    <div style="font-size:12px;color:var(--text-muted);">${time}</div>
                    ${phone ? `<div style="font-size:12px;color:var(--accent-brand);font-weight:600;">${phone}</div>` : '<div style="font-size:12px;color:var(--accent-red);">Geen telefoonnummer</div>'}
                  </div>
                  <div style="display:flex;gap:6px;flex-shrink:0;">
                    ${phone ? `<a href="tel:${phone}" class="btn btn-primary btn-sm"><i data-lucide="phone" style="width:12px;height:12px;"></i> Bellen</a>` : ''}
                    <button class="btn btn-ghost btn-sm" onclick="markDashboardReminder('${r.id}')">Gedaan</button>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        `;
        refreshIcons();
      } catch (err) {
        console.error('Reminders error:', err);
      }
    }

    async function markDashboardReminder(id) {
      try {
        await API.post(`/calendar/reminders/${id}/sent`);
        showToast('Herinnering gemarkeerd als verstuurd');
        loadDashboardReminders();
      } catch (err) { showToast(err.message, 'error'); }
    }

    async function loadDashboard() {
      try {
        const [dashboard, funnel, revenue, recentLeads] = await Promise.all([
          API.get('/stats/dashboard'),
          API.get('/stats/funnel'),
          API.get('/stats/revenue'),
          API.get('/stats/recent-leads')
        ]);

        renderKPIs(dashboard, revenue);
        renderRevenueTrend(revenue);
        renderPipelineSnapshot(dashboard, funnel);
        renderRecentLeads(recentLeads);
        renderRevenueSplit(revenue);
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    // ========== 4 BIG KPI CARDS ==========
    function renderKPIs(data, revenue) {
      const c = data.current;
      const conv = data.conversions;
      const grid = document.getElementById('kpi-grid');
      
      const b = revenue?.breakdown || {};
      const mrr = (b.actualMRR || 0) + (b.upsellMRR || 0);
      const yr = revenue?.currentYear || new Date().getFullYear();
      const hostCY = b.hostingCurrentYear || 0;
      const upsellCY = b.upsellCurrentYear || 0;
      const eenmaligNetto = (b.eenmalig || 0) + (b.upsellOneTime || 0) - (b.discount || 0);
      const totalCY = eenmaligNetto + hostCY + upsellCY;
      const profit = revenue?.totalProfitThisYear || 0;
      const margin = revenue?.profitMarginThisYear || 0;

      grid.innerHTML = `
        <div class="dashboard-kpi-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:24px;">
          <div class="dashboard-card">
            <div class="dashboard-card-header">
              ${wrapWithTooltip('<span class="dashboard-label">Omzet ' + yr + '</span>', 'omzet-jaar')}
              <i data-lucide="trending-up" style="color:var(--accent-green);width:20px;height:20px;"></i>
            </div>
            <div class="dashboard-value" style="color:var(--accent-green);">${formatCurrency(totalCY)}</div>
            <div class="dashboard-subtext">Een: ${formatCurrency(eenmaligNetto)} | Host: ${formatCurrency(hostCY)}</div>
          </div>
          <div class="dashboard-card">
            <div class="dashboard-card-header">
              ${wrapWithTooltip('<span class="dashboard-label">MRR</span>', 'mrr')}
              <i data-lucide="repeat" style="color:var(--accent-brand);width:20px;height:20px;"></i>
            </div>
            <div class="dashboard-value" style="color:var(--accent-brand);">${formatCurrency(mrr)}</div>
            <div class="dashboard-subtext">${formatCurrency(mrr * 12)}/jaar verwacht</div>
          </div>
          <div class="dashboard-card">
            <div class="dashboard-card-header">
              ${wrapWithTooltip('<span class="dashboard-label">Winst ' + yr + '</span>', 'winst-jaar')}
              <i data-lucide="piggy-bank" style="color:${profit >= 0 ? 'var(--accent-green)' : 'var(--accent-red)'};width:20px;height:20px;"></i>
            </div>
            <div class="dashboard-value" style="color:${profit >= 0 ? 'var(--accent-green)' : 'var(--accent-red)'};">${formatCurrency(profit)}</div>
            <div class="dashboard-subtext">Marge: ${margin}%</div>
          </div>
          <div class="dashboard-card">
            <div class="dashboard-card-header">
              ${wrapWithTooltip('<span class="dashboard-label">Klanten</span>', 'totaal-klanten')}
              <i data-lucide="building-2" style="color:var(--accent-purple);width:20px;height:20px;"></i>
            </div>
            <div class="dashboard-value" style="color:var(--accent-purple);">${data.totalClients || c.KLANT}</div>
            <div class="dashboard-subtext">Response: ${conv.responseRate}% | Close: ${conv.closeRate}%</div>
          </div>
        </div>
      `;
      refreshIcons();
    }

    // ========== REVENUE TREND: Line chart with bar underneath ==========
    function renderRevenueTrend(revenue) {
      const ctx = document.getElementById('revenue-trend-chart').getContext('2d');
      const monthlyData = revenue.monthlyBreakdown || [];
      const labels = monthlyData.map(m => {
        const mo = parseInt(m.month.split('-')[1]);
        return ['Jan','Feb','Mrt','Apr','Mei','Jun','Jul','Aug','Sep','Okt','Nov','Dec'][mo - 1];
      });
      
      // Calculate totals per month for the line
      const totals = monthlyData.map(m => (m.eenmalig || 0) - (m.korting || 0) + (m.hosting || 0) + (m.upsellEenmalig || 0) + (m.upsellMaandelijks || 0));
      // Cumulative for area
      let cumulative = [];
      totals.reduce((acc, val, i) => { cumulative[i] = acc + val; return acc + val; }, 0);

      document.getElementById('revenue-chart-year').textContent = revenue.currentYear;

      new Chart(ctx, {
        type: 'bar',
        data: {
          labels,
          datasets: [
            {
              label: 'Cumulatief',
              data: cumulative,
              type: 'line',
              borderColor: '#10B981',
              backgroundColor: 'rgba(16,185,129,0.08)',
              borderWidth: 2,
              pointRadius: 3,
              pointBackgroundColor: '#10B981',
              fill: true,
              tension: 0.3,
              yAxisID: 'y1',
              order: 0
            },
            {
              label: 'Per maand',
              data: totals,
              backgroundColor: 'rgba(59,130,246,0.5)',
              borderColor: '#3B82F6',
              borderWidth: 1,
              borderRadius: 4,
              yAxisID: 'y',
              order: 1
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { position: 'top', labels: { color: '#94A3B8', font: { size: 11 }, boxWidth: 10, padding: 12, usePointStyle: true } },
            tooltip: {
              ...TT,
              callbacks: {
                label: (c) => `${c.dataset.label}: ${formatCurrency(c.parsed.y)}`
              }
            }
          },
          scales: {
            x: { grid: { display: false }, ticks: { color: '#64748B', font: { size: 11 } } },
            y: { position: 'left', grid: { color: 'rgba(148,163,184,0.06)', drawBorder: false }, ticks: { color: '#64748B', font: { size: 10 }, callback: v => formatCurrency(v) } },
            y1: { position: 'right', grid: { display: false }, ticks: { color: '#10B981', font: { size: 10 }, callback: v => formatCurrency(v) } }
          }
        }
      });
    }

    // ========== PIPELINE SNAPSHOT ==========
    function renderPipelineSnapshot(dashboard, funnel) {
      const container = document.getElementById('pipeline-snapshot');
      const c = dashboard.current;
      const conv = dashboard.conversions;

      const steps = [
        { label: 'Totaal leads', value: dashboard.totalLeads, color: '#64748B', icon: 'users' },
        { label: 'Verstuurd', value: c.VERSTUURD + c.GEEN_REACTIE, pct: conv.sendRate, color: '#3B82F6', icon: 'send' },
        { label: 'Gereageerd', value: c.GEREAGEERD + c.NIET_GEINTERESSEERD, pct: conv.responseRate, color: '#F59E0B', icon: 'message-square' },
        { label: 'Interesse', value: c.AFSPRAAK, pct: conv.interestRate, color: '#8B5CF6', icon: 'thumbs-up' },
        { label: 'Klant', value: c.KLANT, pct: conv.closeRate, color: '#10B981', icon: 'building-2' }
      ];

      const maxVal = Math.max(...steps.map(s => s.value), 1);

      container.innerHTML = `
        <div style="display:flex;flex-direction:column;gap:10px;padding:4px 0;">
          ${steps.map((s, i) => {
            const barPct = (s.value / maxVal) * 100;
            return `
              <div style="display:flex;align-items:center;gap:12px;padding:0 12px;">
                <i data-lucide="${s.icon}" style="width:14px;height:14px;color:${s.color};flex-shrink:0;"></i>
                <span style="width:90px;font-size:12px;color:var(--text-secondary);font-weight:500;">${s.label}</span>
                <div style="flex:1;height:20px;background:rgba(255,255,255,0.04);border-radius:4px;overflow:hidden;position:relative;">
                  <div style="height:100%;width:${barPct}%;background:${s.color}30;border-radius:4px;border-left:3px solid ${s.color};transition:width 0.6s ease;"></div>
                </div>
                <span style="width:40px;text-align:right;font-size:13px;font-weight:700;color:var(--text-primary);">${s.value}</span>
                ${s.pct !== undefined ? `<span style="width:45px;text-align:right;font-size:11px;font-weight:600;color:${s.color};">${s.pct}%</span>` : '<span style="width:45px;"></span>'}
              </div>
            `;
          }).join('')}
        </div>
        <div style="padding:12px;margin-top:8px;border-top:1px solid var(--border-color);text-align:center;">
          <a href="stats.html" style="font-size:12px;color:var(--accent-brand);text-decoration:none;font-weight:600;">Bekijk volledige funnel analyse &rarr;</a>
        </div>
      `;
      refreshIcons();
    }

    // ========== REVENUE SPLIT ==========
    function renderRevenueSplit(revenue) {
      const container = document.getElementById('revenue-split');
      const b = revenue?.breakdown || {};
      const yr = revenue?.currentYear || new Date().getFullYear();
      const hostCY = b.hostingCurrentYear || 0;
      const upsellCY = b.upsellCurrentYear || 0;
      const eenmalig = (b.eenmalig || 0) + (b.upsellOneTime || 0) - (b.discount || 0);
      const totalCY = eenmalig + hostCY + upsellCY;
      const costs = revenue?.totalCostsThisYear || 0;
      const maxBar = Math.max(eenmalig, hostCY, upsellCY, 1);

      function splitBar(label, value, color) {
        const pct = maxBar > 0 ? (value / maxBar) * 100 : 0;
        const totalPct = totalCY > 0 ? ((value / totalCY) * 100).toFixed(0) : 0;
        return `
          <div style="padding:0 12px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;">
              <span style="font-size:12px;color:var(--text-muted);">${label}</span>
              <span style="font-size:12px;font-weight:600;color:${color};">${formatCurrency(value)} <span style="color:var(--text-muted);font-weight:400;">(${totalPct}%)</span></span>
            </div>
            <div style="width:100%;height:6px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden;">
              <div style="width:${pct}%;height:100%;background:${color};border-radius:3px;transition:width 0.6s ease;"></div>
            </div>
          </div>
        `;
      }

      container.innerHTML = `
        <div style="display:flex;flex-direction:column;gap:12px;padding:4px 0;">
          <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:rgba(16,185,129,0.06);border-radius:6px;margin:0 8px;">
            <span style="color:var(--text-muted);font-size:12px;">Totaal ${yr}</span>
            <span style="font-weight:700;font-size:18px;color:var(--accent-green);">${formatCurrency(totalCY)}</span>
          </div>
          ${splitBar('Eenmalig (netto)', eenmalig, '#3B82F6')}
          ${splitBar('Hosting', hostCY, '#10B981')}
          ${upsellCY > 0 ? splitBar('Upsells', upsellCY, '#8B5CF6') : ''}
          ${costs > 0 ? `
            <hr style="border-color:var(--border-color);margin:2px 12px;">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 12px;">
              <div style="padding:10px;background:rgba(245,158,11,0.06);border-radius:6px;text-align:center;">
                <div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;">Kosten</div>
                <div style="font-size:14px;font-weight:700;color:var(--accent-orange);margin-top:2px;">${formatCurrency(costs)}</div>
              </div>
              <div style="padding:10px;background:rgba(59,130,246,0.06);border-radius:6px;text-align:center;">
                <div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;">ROI</div>
                <div style="font-size:14px;font-weight:700;color:var(--accent-brand);margin-top:2px;">${revenue?.roi || 0}%</div>
              </div>
            </div>
          ` : ''}
          <div style="padding:8px 12px;text-align:center;border-top:1px solid var(--border-color);margin-top:4px;">
            <a href="stats.html" style="font-size:12px;color:var(--accent-brand);text-decoration:none;font-weight:600;">Bekijk volledige omzet analyse &rarr;</a>
          </div>
        </div>
      `;
    }

    // ========== RECENT LEADS ==========
    function renderRecentLeads(leads) {
      const container = document.getElementById('recent-leads');
      if (leads.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-title">Geen leads</div><div class="empty-state-text">Importeer leads om te beginnen</div></div>';
        return;
      }

      container.innerHTML = `
        <table class="data-table">
          <thead><tr><th>Bedrijf</th><th>Gemeente</th><th>Status</th><th>Datum</th></tr></thead>
          <tbody>
            ${leads.slice(0, 8).map(l => `
              <tr>
                <td style="font-weight:500;">${l.companyName}</td>
                <td style="color:var(--text-muted);">${l.city || '-'}</td>
                <td>${statusBadge(l.status)}</td>
                <td style="color:var(--text-muted);font-size:12px;">${formatDate(l.createdAt)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    init();
  </script>
</body>
</html>
